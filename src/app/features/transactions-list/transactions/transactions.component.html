<div class="flex items-center justify-center">
  <div class="w-full max-w-lg">
    <form [formGroup]="transactionForm" (ngSubmit)="onSubmit()" class="space-y-5 text-sm">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Title</label>
        <input
          type="text"
          formControlName="title"
          placeholder="Ex: Food expenses,..."
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
          [ngClass]="{
            'border-red-500':
              transactionForm.get('title')?.touched && transactionForm.get('title')?.invalid,
          }"
        />
        @if (
          transactionForm.get('title')?.touched &&
          transactionForm.get('title')?.errors?.['required']
        ) {
          <small class="text-red-500 mt-1 block"> Title is required </small>
        }
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Amount (VNĐ)</label>
          <input
            type="text"
            [value]="formattedAmount"
            (input)="onAmountChange($event)"
            (blur)="onAmountBlur()"
            class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
            [ngClass]="[
              transactionForm.get('amount')?.touched && transactionForm.get('amount')?.invalid
                ? 'border-red-500'
                : 'border-slate-200',
            ]"
          />
          @if (
            transactionForm.get('amount')?.touched && transactionForm.get('amount')?.errors?.['min']
          ) {
            <small class="text-red-500 mt-1 block"> The minimum amount is 1.000 VND. </small>
          }
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Date</label>
          <input
            type="date"
            formControlName="date"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Category</label>
        <select
          formControlName="category"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white focus:ring-2 focus:ring-indigo-500 outline-none appearance-none cursor-pointer"
        >
          <option value="" disabled selected>Select a category...</option>
          @for (cat of (categories$ | async) ?? []; track cat.id) {
            <option [ngValue]="cat.id">{{ cat.title }}</option>
          }
        </select>
      </div>

      <div
        class="flex items-center space-x-3 p-3 bg-slate-50 rounded-xl border border-dashed border-slate-300"
      >
        <input
          type="checkbox"
          formControlName="isIncome"
          id="isIncome"
          class="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500 cursor-pointer"
        />
        <label for="isIncome" class="text-sm font-medium text-slate-700 cursor-pointer"
          >Is income?</label
        >
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Note</label>
        <textarea
          formControlName="note"
          rows="3"
          placeholder="Add specific note..."
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all resize-none"
        ></textarea>
      </div>
      @if (!hideSubmitButton) {
        <button
          type="submit"
          [disabled]="transactionForm.invalid"
          class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-bold py-4 rounded-2xl transition-all transform active:scale-[0.98] shadow-lg shadow-indigo-200"
        >
          Lưu Giao Dịch
        </button>
      }
    </form>
  </div>
</div>
