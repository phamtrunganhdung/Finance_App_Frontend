<div class="p-6 bg-white rounded-2xl shadow-sm border border-slate-100">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold text-slate-800">Recent Transactions</h2>
    <button
      (click)="openModal()"
      class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"
    >
      Create New Transaction
    </button>
  </div>
  <div class="space-y-3">
    <div
      class="flex justify-between items-center p-4 bg-slate-50 rounded-xl hover:bg-slate-100 transition-colors"
    >
      <div class="flex flex-col">
        <span class="font-semibold text-slate-700">Netflix Subscription</span>
        <span class="text-xs text-slate-500 mt-1">Today, 10:00 AM</span>
      </div>
      <span class="font-bold text-red-500">-$15.00</span>
    </div>
    <div
      class="flex justify-between items-center p-4 bg-slate-50 rounded-xl hover:bg-slate-100 transition-colors"
    >
      <div class="flex flex-col">
        <span class="font-semibold text-slate-700">Salary Deposit</span>
        <span class="text-xs text-slate-500 mt-1">Yesterday, 5:00 PM</span>
      </div>
      <span class="font-bold text-green-500">+$3,000.00</span>
    </div>
  </div>

  <!-- Modal -->
  @if (isModalOpen) {
    <div class="relative z-50" aria-labelledby="modal-title" role="dialog" aria-modal="true">
      <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"></div>
      <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
        <div
          class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0"
        >
          <div
            class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg"
          >
            <div
              class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4 flex justify-between items-center border-b border-gray-200"
            >
              <h3 class="text-lg font-semibold leading-6 text-gray-900" id="modal-title">
                Create Transaction
              </h3>
              <button
                type="button"
                (click)="closeModal()"
                class="text-gray-400 hover:text-gray-500"
              >
                <span class="sr-only">Close</span>
                <svg
                  class="h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  aria-hidden="true"
                >
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
            <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
              <app-transaction-form
                #transactionForm
                [hideSubmitButton]="true"
              ></app-transaction-form>
            </div>
            <div
              class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6 border-t border-gray-200"
            >
              <button
                type="button"
                (click)="transactionForm.onSubmit()"
                class="inline-flex w-full justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 sm:ml-3 sm:w-auto"
              >
                Create
              </button>
              <button
                type="button"
                (click)="closeModal()"
                class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto"
              >
                Close
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  }
</div>
